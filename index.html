<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verandah Cafe</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
    margin:0;
    font-family:'Poppins',sans-serif;
    background:#0b0b0b;
    color:white;
    scroll-behavior:smooth;
}

/* HERO */
.hero {
    height:100vh;
    background:url('YOUR_IMAGE_1.jpg') center/cover no-repeat;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
}

.hero h1 {
    font-size:50px;
    background:rgba(0,0,0,0.5);
    padding:10px 20px;
}

.btn {
    margin-top:20px;
    padding:12px 25px;
    background:#c8a96a;
    border:none;
    border-radius:30px;
    cursor:pointer;
}

/* SECTIONS */
.section {
    padding:80px 20px;
    max-width:1100px;
    margin:auto;
    opacity:0;
    transform:translateY(40px);
    transition:0.6s;
}

.section.show {
    opacity:1;
    transform:translateY(0);
}

/* MENU */
.menu-tabs button {
    margin:5px;
    padding:10px 20px;
    border:none;
    border-radius:20px;
    background:#1a1a1a;
    color:white;
    cursor:pointer;
}

.menu-tabs button.active {
    background:#c8a96a;
    color:black;
}

.menu-grid {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    margin-top:20px;
}

.card {
    background:#1a1a1a;
    border-radius:12px;
    overflow:hidden;
    transition:0.3s;
}

.card:hover {
    transform:scale(1.05);
}

.card img {
    width:100%;
    height:150px;
    object-fit:cover;
}

.card h3 {
    padding:10px;
}

.price {
    color:#c8a96a;
    padding:0 10px 10px;
}

/* GALLERY */
.gallery {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:10px;
}

.gallery img {
    width:100%;
    height:200px;
    object-fit:cover;
    border-radius:10px;
}

/* REVIEW */
.review {
    background:#1a1a1a;
    padding:15px;
    margin:10px 0;
    border-radius:10px;
}
</style>
</head>

<body>

<div class="hero">
    <h1>VERANDAH</h1>
    <button class="btn" onclick="scrollToMenu()">Explore Menu</button>
</div>

<div class="section" id="menu">
    <h2>Most Loved Menu</h2>

    <div class="menu-tabs">
        <button onclick="loadMenu('popular')" class="active">Popular</button>
        <button onclick="loadMenu('coffee')">Coffee</button>
        <button onclick="loadMenu('food')">Food</button>
    </div>

    <div id="menu-content" class="menu-grid"></div>
</div>

<div class="section">
    <h2>Gallery</h2>
    <div class="gallery">
        <img src="YOUR_IMAGE_2.jpg">
        <img src="YOUR_IMAGE_3.jpg">
        <img src="YOUR_IMAGE_4.jpg">
        <img src="YOUR_IMAGE_5.jpg">
    </div>
</div>

<div class="section">
    <h2>Reviews</h2>
    <div class="review">“Amazing ambience and food.”</div>
    <div class="review">“Feels like home.”</div>
</div>

<script>
const menuData = {
    popular:[
        {name:"Crispy Chicken",price:"₹300",img:"YOUR_IMAGE_2.jpg"},
        {name:"Irish Cappuccino",price:"₹180",img:"YOUR_IMAGE_3.jpg"}
    ],
    coffee:[
        {name:"Hot Chocolate",price:"₹200",img:"YOUR_IMAGE_4.jpg"}
    ],
    food:[
        {name:"White Sauce Pasta",price:"₹300",img:"YOUR_IMAGE_5.jpg"}
    ]
};

function loadMenu(type){
    let container=document.getElementById("menu-content");
    container.innerHTML="";
    menuData[type].forEach(item=>{
        container.innerHTML+=`
        <div class="card">
            <img src="${item.img}">
            <h3>${item.name}</h3>
            <p class="price">${item.price}</p>
        </div>`;
    });
}

function scrollToMenu(){
    document.getElementById("menu").scrollIntoView();
}

// SCROLL ANIMATION
window.addEventListener("scroll",()=>{
    document.querySelectorAll(".section").forEach(sec=>{
        let pos=sec.getBoundingClientRect().top;
        if(pos<window.innerHeight-100){
            sec.classList.add("show");
        }
    });
});

loadMenu("popular");
</script>

</body>
</html>
