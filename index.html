<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kava Cafe</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #0f0f0f, #1a1a1a);
    color: white;
}

/* NAVBAR */
header {
    display: flex;
    justify-content: space-between;
    padding: 15px 25px;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(10px);
    position: sticky;
    top: 0;
}

header h1 {
    color: #f5c16c;
}

nav button {
    background: none;
    border: none;
    color: white;
    margin: 0 8px;
    cursor: pointer;
    font-size: 15px;
}

nav button.active {
    color: #f5c16c;
}

/* SECTIONS */
.section {
    display: none;
    padding: 40px 20px;
    max-width: 1100px;
    margin: auto;
}

.section.active {
    display: block;
}

/* MENU */
.menu-tabs {
    margin-top: 20px;
}

.menu-tabs button {
    padding: 10px 18px;
    margin: 5px;
    border-radius: 20px;
    border: none;
    background: rgba(255,255,255,0.08);
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

.menu-tabs button.active {
    background: #f5c16c;
    color: black;
}

.menu-grid {
    margin-top: 25px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px,1fr));
    gap: 20px;
}

.card {
    padding: 20px;
    border-radius: 15px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-5px);
}

.price {
    color: #f5c16c;
}

/* BUTTON */
.main-btn {
    background: #f5c16c;
    color: black;
    padding: 12px 20px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    margin-top: 20px;
}

/* REVIEWS */
.review {
    background: rgba(255,255,255,0.05);
    padding: 15px;
    border-radius: 10px;
    margin-top: 10px;
}
</style>
</head>

<body>

<header>
    <h1>Kava Cafe</h1>
    <nav>
        <button class="nav-btn active" data-section="menu">Menu</button>
        <button class="nav-btn" data-section="reviews">Reviews</button>
        <button class="nav-btn" data-section="location">Find Us</button>
        <button class="nav-btn" data-section="about">About</button>
    </nav>
</header>

<!-- MENU -->
<div id="menu" class="section active">
    <h2>Explore Menu</h2>

    <div class="menu-tabs">
        <button class="menu-btn active" data-menu="coffee">Coffee</button>
        <button class="menu-btn" data-menu="food">Food</button>
        <button class="menu-btn" data-menu="desserts">Desserts</button>
        <button class="menu-btn" data-menu="drinks">Drinks</button>
    </div>

    <div id="menu-content" class="menu-grid"></div>
</div>

<!-- REVIEWS -->
<div id="reviews" class="section">
    <h2>⭐ 4.2 Rating</h2>
    <div class="review">Amazing ambience & tasty food</div>
    <div class="review">Coffee is top-notch</div>
    <div class="review">Great hangout spot</div>
</div>

<!-- LOCATION -->
<div id="location" class="section">
    <h2>Find Us</h2>
    <p>Vijayawada, Andhra Pradesh</p>

    <button class="main-btn" id="mapBtn">Open in Google Maps</button>

    <iframe 
    src="https://maps.google.com/maps?q=Kava%20Cafe%20Vijayawada&t=&z=15&ie=UTF8&iwloc=&output=embed"
    width="100%" height="300" style="border:0; margin-top:20px;">
    </iframe>
</div>

<!-- ABOUT -->
<div id="about" class="section">
    <h2>About Kava Cafe</h2>
    <p>
        A fast-growing modern cafe in Vijayawada with premium coffee, diverse menu,
        and a perfect ambience for hangouts.
    </p>
</div>

<script>
// SECTION SWITCH
document.querySelectorAll(".nav-btn").forEach(btn => {
    btn.addEventListener("click", function() {

        document.querySelectorAll(".nav-btn").forEach(b => b.classList.remove("active"));
        this.classList.add("active");

        document.querySelectorAll(".section").forEach(sec => sec.classList.remove("active"));
        document.getElementById(this.dataset.section).classList.add("active");
    });
});

// MENU DATA
const menuData = {
    coffee: [
        {name: "Cappuccino", price: "₹150"},
        {name: "Latte", price: "₹180"},
        {name: "Espresso", price: "₹100"}
    ],
    food: [
        {name: "Chicken Tikka Sandwich", price: "₹280"},
        {name: "Sliders", price: "₹220"},
        {name: "Penne Pasta", price: "₹300"}
    ],
    desserts: [
        {name: "Lotus Biscoff Cake", price: "₹180"},
        {name: "Red Velvet Cake", price: "₹170"}
    ],
    drinks: [
        {name: "Mojito", price: "₹180"},
        {name: "Chocolate Milkshake", price: "₹200"}
    ]
};

// MENU SWITCH
const menuContent = document.getElementById("menu-content");

document.querySelectorAll(".menu-btn").forEach(btn => {
    btn.addEventListener("click", function() {

        document.querySelectorAll(".menu-btn").forEach(b => b.classList.remove("active"));
        this.classList.add("active");

        loadMenu(this.dataset.menu);
    });
});

function loadMenu(type) {
    menuContent.innerHTML = "";
    menuData[type].forEach(item => {
        menuContent.innerHTML += `
            <div class="card">
                <h3>${item.name}</h3>
                <p class="price">${item.price}</p>
            </div>
        `;
    });
}

// MAP BUTTON
document.getElementById("mapBtn").addEventListener("click", function() {
    window.open("https://www.google.com/maps/search/?api=1&query=Kava+Cafe+Vijayawada", "_blank");
});

// DEFAULT LOAD
loadMenu("coffee");
</script>

</body>
</html>
